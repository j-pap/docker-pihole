name: Publish Docker Image

on:
  schedule:
    - cron: '15 11 * * *'
  push:
    branches:
      - main
    paths:
      - 'custom-start.sh'
      - 'Dockerfile'
  workflow_dispatch:

env:
  GH_REGISTRY: ghcr.io
  IMAGE_NAME: j-pap/pihole

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      needs-updating: ${{ steps.check.outputs.needs-updating }}

    steps:
      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.GH_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Image Update Checker
        id: check
        if: ${{ github.event_name == 'schedule' }}
        uses: lucacome/docker-image-update-checker@v3.1.0
        with:
          base-image: ${{ env.GH_REGISTRY }}/pi-hole/pihole:latest
          image: ${{ env.GH_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          platforms: linux/amd64,linux/arm64

  build:
    needs: check
    if: ${{ github.event_name != 'schedule' || needs.check.outputs.needs-updating == 'true' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.GH_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Latest Release
        id: upstream
        uses: pozetroninc/github-action-get-latest-release@v0.8.0
        with:
          repository: pi-hole/docker-pi-hole
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build and push Docker image
        id: build-and-push
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/build-push-action@v7.1.0
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.GH_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.GH_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.upstream.outputs.release }}

      - name: Generate Attestation
        uses: actions/attest@v4.1.0
        with:
          subject-name: ${{ env.GH_REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          push-to-registry: true
